apiVersion: v1
kind: ServiceAccount
metadata:
  name: wiz-app-sa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wiz-app-admin

subjects:
- kind: ServiceAccount
  name: wiz-app-sa
  namespace: default

roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io